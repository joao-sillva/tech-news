<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" />
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/index.css" />
  <title>Tech News</title>
</head>
<body>
  <header class="container">
    <nav id="primary" class="grid grid-flow-column">
      <div>
        <img src="assets/icons/list.svg" alt="Icone de menu">
        <strong>Menu</strong>
      </div>
    
      <div>
        <img src="assets/logo.svg" alt="Logo Tech News">
      </div>

      <div>
        <strong>Buscar</strong>
        <img src="assets/icons/search.svg" alt="Icone de busca">
      </div>
    </nav>

    <nav id="secondary" class="grid grid-flow-column">
      <a href="#">Inteligência Artificial</a>
      <a href="#">Blockchain</a>
      <a href="#">Hologramas</a>
      <a href="#">Internet</a>
      <a href="#">Vestíveis</a>
      <a href="#">Realidade Aumentada</a>
      <a href="#">Realidade  Virtual</a>
    </nav>
  </header>

  <main class="grid container">
    <section id="featured" class="grid grid-flow-column gap-16">
      <figure class="card">
        <img src="assets/images/image-1.svg" alt="Imagem de um robô">

        <figcaption>
          <span class="content-tag">
            Robótica
          </span>

          <h2 class="text-2xl">
            Robôs domésticos começam a ser adotados para tarefas diárias,
            prometendo mais conforto e eficiência nas residências.
          </h2>
        </figcaption>
      </figure>

      <div class="grid grid-columns-2 gap-16">
        <div class="card">
          <img src="assets/images/image-2.svg" alt="Imagem de um smartphone">
        </div>
  
        <div class="card">
          <img src="assets/images/image-3.svg" alt="Imagem de tecnologia 6G">
        </div>

        <div class="card">
          <img src="assets/images/image-4.svg" alt="Imagem de um relógio inteligente">
        </div>

        <div class="card">
          <img src="assets/images/image-5.svg" alt="Imagem de uma escola adotando a tecnologia VR">
        </div>
      </div>
    </section>
  </main>
</body>
</html>
